<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login System</title>
</head>
<body>
    <h2>System Login</h2>
    
    <form id="loginForm">
        <input type="text" id="username" placeholder="Enter username" required><br><br>
        <input type="password" id="password" placeholder="Enter password" required><br><br>
        <button type="submit">Login</button>
    </form>

    <h3 id="messageArea"></h3>

    <script>
        // Catch the form submission
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            // Prevent the page from refreshing
            event.preventDefault();

            // Get the values from the inputs
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Send a POST request to our ServerManager
            fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                // Convert our data to a JSON string
                body: JSON.stringify({ username: user, password: pass })
            })
            .then(response => response.json()) // Parse the server's response
            .then(data => {
                const messageArea = document.getElementById('messageArea');
                
                // Check the response from our server
                if (data.success) {
                    messageArea.style.color = "green";
                    messageArea.innerText = data.message;
                } else {
                    messageArea.style.color = "red";
                    messageArea.innerText = data.error;
                }
            })
            .catch(err => console.error('Error:', err));
        });
    </script>
</body>
</html>
